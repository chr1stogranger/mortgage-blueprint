    <meta name="description" content="RealStack Blueprint — the supercharged mortgage calculator. Loan scenarios, payment breakdowns, tax savings, amortization, and more." />
    <title>RealStack Blueprint</title>
    <script>
      // Load Google Places API dynamically from env key (injected by Vite at build)
      (function() {
        var k = '__GOOGLE_PLACES_KEY__';
        function boot() {
          var key = window[k];
          if (!key) return;
          var s = document.createElement('script');
          s.src = 'https://maps.googleapis.com/maps/api/js?key=' + key + '&libraries=places&loading=async';
          s.async = true;
          document.head.appendChild(s);
        }
        // Try immediately (key may already be set by main.jsx)
        if (window[k]) boot();
        else {
          // Retry once after main.jsx has run
          var orig = Object.getOwnPropertyDescriptor(window, k);
          Object.defineProperty(window, k, {
            set: function(v) { Object.defineProperty(window, k, { value: v, writable: true }); boot(); },
            configurable: true
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
